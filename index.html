<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأستاذ محمد سلهب - الموسيقى العربية الأصيلة</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: #d4af37;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 15px;
            background: #1a1a1a;
            border-radius: 18px;
            box-shadow: 0 4px 24px rgba(212, 175, 55, 0.14);
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: #d4af37;
            text-align: center;
        }
        p {
            font-size: 1.2rem;
            color: #f5e6b3;
            text-align: center;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 2rem;
            margin-top: 2rem;
            justify-content: center;
        }
        .product-card {
            background: #232323;
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 16px;
            width: 220px;
            text-align: center;
        }
        .product-card h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #f5e6b3;
        }
        .product-card .price {
            color: #d4af37;
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .product-card button {
            background: #d4af37;
            border: none;
            color: #0a0a0a;
            font-weight: bold;
            border-radius: 6px;
            padding: 7px 18px;
            margin-top: 10px;
            cursor: pointer;
            transition: background .2s;
        }
        .product-card button:hover {
            background: #dbc36a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>الأستاذ محمد سلهب</h1>
        <p>مرحباً بكم في موقع الموسيقى العربية الأصيلة</p>
        <div class="products">
            <div class="product-card">
                <h2>منتج 1</h2>
                <div class="price">25 ر.س</div>
                <button>إضافة للسلة</button>
            </div>
            <div class="product-card">
                <h2>منتج 2</h2>
                <div class="price">40 ر.س</div>
                <button>إضافة للسلة</button>
            </div>
            <div class="product-card">
                <h2>منتج 3</h2>
                <div class="price">15 ر.س</div>
                <button>إضافة للسلة</button>
            </div>
        </div>
    </div>
</body>
</html>
