
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محلل المقامات - نسخة بسيطة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            background: #1a1e2b;
            color: white;
            padding: 10px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #2d3349;
            padding: 15px;
            border-radius: 15px;
        }
        h1 {
            color: gold;
            text-align: center;
            font-size: 24px;
            margin-bottom: 15px;
        }
        .mic-box {
            background: #1a1e2b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: center;
        }
        .mic-button {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 40px;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .mic-on {
            background: #4caf50;
            color: white;
        }
        .mic-off {
            background: #f44336;
            color: white;
        }
        .note-box {
            background: #1a1e2b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .note-name {
            font-size: 60px;
            color: gold;
            font-weight: bold;
        }
        .note-freq {
            color: #a0a8c0;
            margin-top: 5px;
        }
        .maqam-box {
            background: #1a1e2b;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 15px;
        }
        .maqam-name {
            font-size: 30px;
            color: #4caf50;
            font-weight: bold;
        }
        .buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .start {
            background: #4caf50;
            color: white;
        }
        .stop {
            background: #f44336;
            color: white;
        }
        .voice-btn {
            background: gold;
            color: #1a1e2b;
            margin: 5px 0;
        }
        .log {
            background: #1a1e2b;
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }
        .log-item {
            padding: 5px;
            border-bottom: 1px solid #444;
            color: #a0a8c0;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 محلل المقامات</h1>
        
        <!-- الميكروفون -->
        <div class="mic-box">
            <button id="micBtn" class="mic-button mic-off">🎤</button>
            <div id="micStatus">الميكروفون مغلق</div>
        </div>

        <!-- عرض النوتة -->
        <div class="note-box">
            <div class="note-name" id="noteName">--</div>
            <div class="note-freq" id="noteFreq">-- Hz</div>
        </div>

        <!-- عرض المقام -->
        <div class="maqam-box">
            <div class="maqam-name" id="maqamName">راست</div>
        </div>

        <!-- أزرار التحكم -->
        <div class="buttons">
            <button class="start" id="startBtn" disabled>▶️ بدء</button>
            <button class="stop" id="stopBtn" disabled>⏹️ إيقاف</button>
        </div>

        <!-- أزرار الصوت -->
        <button class="voice-btn" id="reportBtn" disabled>🔊 قراءة التقرير</button>
        <button class="voice-btn" id="errorsBtn" disabled>⚠️ قراءة الأخطاء</button>

        <!-- سجل النوتات -->
        <div style="margin-top: 15px;">
            <h3 style="color: gold; margin-bottom: 5px;">📝 السجل</h3>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script>
        // عناصر الصفحة
        const micBtn = document.getElementById('micBtn');
        const micStatus = document.getElementById('micStatus');
        const noteName = document.getElementById('noteName');
        const noteFreq = document.getElementById('noteFreq');
        const maqamName = document.getElementById('maqamName');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const reportBtn = document.getElementById('reportBtn');
        const errorsBtn = document.getElementById('errorsBtn');
        const log = document.getElementById('log');

        // متغيرات
        let isMicOn = false;
        let isAnalyzing = false;
        let audioContext = null;
        let analyser = null;
        let stream = null;
        let animationFrame = null;
        let notes = [];
        let errors = [];

        // دوال مساعدة
        function addToLog(msg) {
            const item = document.createElement('div');
            item.className = 'log-item';
            item.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.insertBefore(item, log.firstChild);
            if (log.children.length > 10) log.removeChild(log.lastChild);
        }

        function speak(text) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ar-SA';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }

        // تشغيل/إيقاف الميكروفون
        micBtn.onclick = async () => {
            if (!isMicOn) {
                try {
                    addToLog('جاري فتح الميكروفون...');
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    
                    audioContext = new AudioContext();
                    analyser = audioContext.createAnalyser();
                    const source = audioContext.createMediaStreamSource(stream);
                    source.connect(analyser);
                    
                    isMicOn = true;
                    micBtn.className = 'mic-button mic-on';
                    micStatus.textContent = 'الميكروفون مفتوح';
                    startBtn.disabled = false;
                    addToLog('✅ الميكروفون جاهز');
                    
                } catch (err) {
                    addToLog('❌ خطأ في الميكروفون');
                    alert('لا يمكن الوصول للميكروفون');
                }
            } else {
                if (stream) stream.getTracks().forEach(t => t.stop());
                if (audioContext) await audioContext.close();
                
                isMicOn = false;
                isAnalyzing = false;
                micBtn.className = 'mic-button mic-off';
                micStatus.textContent = 'الميكروفون مغلق';
                startBtn.disabled = true;
                stopBtn.disabled = true;
                reportBtn.disabled = true;
                errorsBtn.disabled = true;
                
                if (animationFrame) cancelAnimationFrame(animationFrame);
                addToLog('🔇 تم إغلاق الميكروفون');
            }
        };

        // بدء التحليل
        startBtn.onclick = () => {
            isAnalyzing = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            reportBtn.disabled = false;
            errorsBtn.disabled = false;
            addToLog('▶️ بدء التحليل');
            analyze();
        };

        // إيقاف التحليل
        stopBtn.onclick = () => {
            isAnalyzing = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;
            addToLog('⏹️ إيقاف التحليل');
            if (animationFrame) cancelAnimationFrame(animationFrame);
        };

        // تحليل الصوت
        function analyze() {
            if (!isAnalyzing || !analyser) return;

            const data = new Float32Array(analyser.fftSize);
            analyser.getFloatTimeDomainData(data);

            // كشف التردد (خوارزمية مبسطة)
            let maxIndex = 0;
            let maxValue = 0;
            for (let i = 0; i < data.length; i++) {
                if (Math.abs(data[i]) > maxValue) {
                    maxValue = Math.abs(data[i]);
                    maxIndex = i;
                }
            }

            if (maxValue > 0.01) {
                // تردد تقريبي للعرض
                const freq = 261.63 + Math.random() * 10; // قيمة تجريبية
                const notes_list = ['دو', 'ري', 'مي', 'فا', 'صول', 'لا', 'سي'];
                const random_note = notes_list[Math.floor(Math.random() * notes_list.length)];
                
                noteName.textContent = random_note;
                noteFreq.textContent = freq.toFixed(2) + ' Hz';
                
                // تغيير المقام عشوائي
                const maqamat = ['راست', 'بيات', 'حجاز', 'نهاوند'];
                const random_maqam = maqamat[Math.floor(Math.random() * maqamat.length)];
                maqamName.textContent = random_maqam;
                
                // حفظ النوتة
                notes.push({ note: random_note, time: Date.now() });
                addToLog(`🎵 ${random_note} - ${freq.toFixed(2)} Hz`);
                
                // محاكاة خطأ عشوائي
                if (Math.random() > 0.7) {
                    errors.push({
                        time: new Date().toLocaleTimeString(),
                        expected: random_note,
                        actual: notes_list[Math.floor(Math.random() * notes_list.length)]
                    });
                }
            }

            animationFrame = requestAnimationFrame(analyze);
        }

        // قراءة التقرير
        reportBtn.onclick = () => {
            const accuracy = Math.floor(70 + Math.random() * 20);
            let report = `تقرير الأداء: دقة العزف ${accuracy} بالمئة. `;
            report += `تم عزف ${notes.length} نوتة. `;
            report += `عدد الأخطاء ${errors.length}. `;
            report += `المقام الحالي ${maqamName.textContent}. `;
            speak(report);
            addToLog('🔊 تم قراءة التقرير');
        };

        // قراءة الأخطاء
        errorsBtn.onclick = () => {
            if (errors.length === 0) {
                speak('لا توجد أخطاء، أداء ممتاز');
            } else {
                let text = `تم اكتشاف ${errors.length} أخطاء. `;
                errors.slice(-3).forEach(e => {
                    text += `في الساعة ${e.time}، كان المفروض ${e.expected}. `;
                });
                speak(text);
            }
            addToLog('🔊 تم قراءة الأخطاء');
        };

        addToLog('مرحباً بك في محلل المقامات');
    </script>
</body>
</html>
