<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الأستاذ محمد سلهب - الموسيقى العربية الأصيلة</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #0a0a0a;
            color: #d4af37;
            min-height: 100vh;
            position: relative;
        }

        /* خلفية فخمة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 50%, #1a1a1a 100%);
            z-index: -2;
        }

        body::after {
            content: '♫ ♪ ♫';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20rem;
            color: rgba(212, 175, 55, 0.03);
            white-space: nowrap;
            z-index: -1;
            pointer-events: none;
            font-family: 'Playfair Display', serif;
        }

        /* Header فخم */
        .navbar {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #d4af37;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 5px 30px rgba(212, 175, 55, 0.2);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #d4af37;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* اسم الأستاذ متحرك بشكل فخم */
        .master-name {
            display: inline-block;
            background: linear-gradient(135deg, #d4af37, #f5e6b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
            font-weight: 700;
            margin-right: 20px;
            padding: 5px 15px;
            border: 2px solid #d4af37;
            border-radius: 50px;
            position: relative;
            animation: elegantMove 4s infinite;
        }

        @keyframes elegantMove {
            0% {
                letter-spacing: 2px;
                transform: translateX(0);
                opacity: 0.8;
            }
            25% {
                letter-spacing: 6px;
                transform: translateX(-10px);
                opacity: 1;
            }
            50% {
                letter-spacing: 2px;
                transform: translateX(10px);
                opacity: 0.8;
            }
            75% {
                letter-spacing: 4px;
                transform: translateX(-5px);
                opacity: 1;
            }
            100% {
                letter-spacing: 2px;
                transform: translateX(0);
                opacity: 0.8;
            }
        }

        .master-name::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #d4af37, transparent, #d4af37);
            border-radius: 50px;
            z-index: -1;
            animation: borderGlow 3s infinite;
        }

        @keyframes borderGlow {
            0% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.3;
            }
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #f5e6b3;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s;
            position: relative;
            padding: 5px 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: #d4af37;
            transition: width 0.3s;
        }

        .nav-links a:hover {
            color: #d4af37;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .cart-icon {
            position: relative;
            cursor: pointer;
            color: #d4af37;
            font-size: 1.3rem;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #8b0000;
            color: #f5e6b3;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 12px;
            border: 1px solid #d4af37;
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        /* Hero Section فخم */
        .hero {
            background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
            border: 2px solid #d4af37;
            border-radius: 30px;
            padding: 5rem 2rem;
            margin-bottom: 3rem;
            text-align: center;
            color: #f5e6b3;
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin-bottom: 1rem;
            color: #d4af37;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            position: relative;
        }

        .hero p {
            font-size: 1.3rem;
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
            position: relative;
        }

        /* Products Section */
        .products-section {
            margin-bottom: 4rem;
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            text-align: center;
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .section-title::before,
        .section-title::after {
            content: '✦';
            color: #d4af37;
            font-size: 2rem;
            margin: 0 20px;
            opacity: 0.5;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2.5rem;
        }

        .product-card {
            background: #2a2a2a;
            border: 2px solid #d4af37;
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4);
            border-color: #f5e6b3;
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
        }

        .product-image {
            height: 200px;
            background: linear-gradient(135deg, #1a1a1a, #3a3a3a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #d4af37;
            font-size: 4rem;
            border-bottom: 1px solid #d4af37;
        }

        .product-info {
            padding: 2rem;
        }

        .product-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #f5e6b3;
        }

        .product-description {
            color: #c0c0c0;
            font-size: 0.95rem;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 1rem;
            font-family: 'Playfair Display', serif;
        }

        .product-type {
            display: inline-block;
            padding: 0.4rem 1.2rem;
            background: #3a3a3a;
            border: 1px solid #d4af37;
            border-radius: 30px;
            font-size: 0.85rem;
            color: #f5e6b3;
            margin-bottom: 1rem;
        }

        .add-to-cart {
            width: 100%;
            padding: 1rem;
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .add-to-cart:hover {
            background: #d4af37;
            color: #1a1a1a;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        /* سلة المشتري - نافذة منبثقة */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-content {
            background: #2a2a2a;
            border: 3px solid #d4af37;
            border-radius: 30px;
            padding: 2rem;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
            box-shadow: 0 30px 60px rgba(212, 175, 55, 0.5);
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #d4af37;
        }

        .cart-header h3 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 1.8rem;
        }

        .close-cart {
            background: none;
            border: none;
            color: #d4af37;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .close-cart:hover {
            transform: scale(1.2);
        }

        .cart-items {
            margin-bottom: 2rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #3a3a3a;
            border-radius: 15px;
            margin-bottom: 1rem;
            border: 1px solid #d4af37;
        }

        .cart-item-info {
            flex: 1;
        }

        .cart-item-title {
            color: #f5e6b3;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }

        .cart-item-price {
            color: #d4af37;
            font-size: 1.1rem;
        }

        .remove-item {
            background: none;
            border: none;
            color: #8b0000;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0.5rem;
            transition: transform 0.3s;
        }

        .remove-item:hover {
            transform: scale(1.2);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            background: #1a1a1a;
            border-radius: 15px;
            margin-bottom: 2rem;
            border: 2px solid #d4af37;
        }

        .cart-total span {
            color: #f5e6b3;
            font-size: 1.2rem;
        }

        .cart-total .total-price {
            color: #d4af37;
            font-size: 1.8rem;
            font-weight: 700;
        }

        .cart-actions {
            display: flex;
            gap: 1rem;
        }

        .checkout-btn {
            flex: 2;
            padding: 1rem;
            background: linear-gradient(135deg, #d4af37, #f5e6b3);
            color: #1a1a1a;
            border: none;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            border: 2px solid #d4af37;
        }

        .checkout-btn:hover {
            background: transparent;
            color: #d4af37;
        }

        .continue-btn {
            flex: 1;
            padding: 1rem;
            background: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .continue-btn:hover {
            background: #d4af37;
            color: #1a1a1a;
        }

        .empty-cart {
            text-align: center;
            padding: 3rem;
            color: #888;
            font-size: 1.2rem;
        }

        /* Custom Request Section - فخم جداً */
        .custom-request {
            background: #2a2a2a;
            border: 3px solid #d4af37;
            border-radius: 40px;
            padding: 3rem;
            margin: 4rem 0;
            box-shadow: 0 30px 60px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
        }

        .custom-request::before {
            content: '♕';
            position: absolute;
            top: -50px;
            right: -50px;
            font-size: 200px;
            color: rgba(212, 175, 55, 0.05);
            transform: rotate(15deg);
        }

        .custom-request::after {
            content: '♕';
            position: absolute;
            bottom: -50px;
            left: -50px;
            font-size: 200px;
            color: rgba(212, 175, 55, 0.05);
            transform: rotate(-15deg);
        }

        .custom-request h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-align: center;
            position: relative;
        }

        .request-form {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            color: #f5e6b3;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem 1.5rem;
            background: #3a3a3a;
            border: 2px solid #d4af37;
            border-radius: 15px;
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            color: #f5e6b3;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #f5e6b3;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #888;
        }

        /* خيارات الدفع */
        .payment-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin: 1rem 0;
        }

        .payment-option {
            background: #3a3a3a;
            border: 2px solid #d4af37;
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .payment-option:hover {
            background: #4a4a4a;
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.3);
        }

        .payment-option.selected {
            background: #d4af37;
            border-color: #f5e6b3;
        }

        .payment-option.selected .payment-label,
        .payment-option.selected .payment-icon {
            color: #1a1a1a;
        }

        .payment-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        .payment-icon {
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 0.5rem;
        }

        .payment-label {
            color: #f5e6b3;
            font-weight: 600;
            font-size: 1rem;
        }

        .payment-option.selected .payment-icon,
        .payment-option.selected .payment-label {
            color: #1a1a1a;
        }

        /* رقم الطلب الخاص */
        .request-number {
            background: linear-gradient(135deg, #1a1a1a, #2a2a2a);
            border: 2px solid #d4af37;
            border-radius: 50px;
            padding: 1.5rem 2rem;
            margin: 2rem 0;
            text-align: center;
            font-size: 1.3rem;
            position: relative;
            overflow: hidden;
        }

        .request-number::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 70%);
            animation: rotateNumber 10s linear infinite;
        }

        @keyframes rotateNumber {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .request-number .number {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #d4af37;
            font-weight: 700;
            letter-spacing: 5px;
            margin: 0 15px;
            position: relative;
            z-index: 2;
        }

        .request-number .private-info {
            color: #f5
